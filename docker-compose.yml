version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-energy-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ai-energy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-energy-frontend
    ports:
      - "5173:80"
    environment:
      - REACT_APP_API_BASE=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-energy-network

networks:
  ai-energy-network:
    driver: bridge

volumes:
  backend-data: